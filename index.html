<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AR несколько видео</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      background-color: rgba(235, 201, 255, 0.637);
    }

    body {
      position: fixed;
      inset: 0;
    }

    a-scene {
      position: fixed !important;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .controls {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      background: rgba(255, 135, 201, 0.418);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="startBtn">Старт</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: false; uiLoading: false;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="video0"
        src="./video0.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>

      <video
        id="video1"
        src="./video1.webm"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>

      <video
        id="video2"
        src="./video2.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>

      <video
        id="video3"
        src="./video3.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>

      <video
        id="video4"
        src="./video4.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>

      <video
        id="video5"
        src="./video5.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>

      <video
        id="video6"
        src="./video6.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target0" mindar-image-target="targetIndex: 0">
      <a-video
        src="#video0"
        width="1"
        height="1"
        position="0 0.1 0"
      ></a-video>
    </a-entity>

    <a-entity id="target1" mindar-image-target="targetIndex: 1">
      <a-video
        src="#video1"
        width="1"
        height="1"
        position="0 0.1 0"
      ></a-video>
    </a-entity>

    <a-entity id="target2" mindar-image-target="targetIndex: 2">
      <a-video
        src="#video2"
        width="1"
        height="1"
        position="0 0.1 0"
      ></a-video>
    </a-entity>

    <a-entity id="target3" mindar-image-target="targetIndex: 3">
      <a-video
        src="#video3"
        width="1"
        height="1"
        position="0 0 0.01"
      ></a-video>
    </a-entity>

    <a-entity id="target4" mindar-image-target="targetIndex: 4">
      <a-video
        src="#video4"
        width="1"
        height="1"
        position="0 0 0.01"
      ></a-video>
    </a-entity>

    <a-entity id="target5" mindar-image-target="targetIndex: 5">
      <a-video
        src="#video5"
        width="1"
        height="1"
        position="0 0 0.01"
      ></a-video>
    </a-entity>
    
    <a-entity id="target6" mindar-image-target="targetIndex: 6">
      <a-video
        src="#video6"
        width="1"
        height="1"
        position="0 0 0.01"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector("a-scene");
    const startBtn = document.getElementById("startBtn");

    const items = [
      {
        target: document.getElementById("target0"),
        video: document.getElementById("video0"),
      },
      {
        target: document.getElementById("target1"),
        video: document.getElementById("video1"),
      },
      {
        target: document.getElementById("target2"),
        video: document.getElementById("video2"),
      },
      {
        target: document.getElementById("target3"),
        video: document.getElementById("video3"),
      },
      {
        target: document.getElementById("target4"),
        video: document.getElementById("video4"),
      },
      {
        target: document.getElementById("target5"),
        video: document.getElementById("video5"),
      },
      {
        target: document.getElementById("target6"),
        video: document.getElementById("video6"),
      }
    ];

    let started = false;

    function stopAllVideos() {
      items.forEach(({ video }) => {
        video.pause();
        video.currentTime = 0;
      });
    }

    startBtn.addEventListener("click", async () => {
      startBtn.remove();

      const mindarSystem = sceneEl.systems["mindar-image-system"];
      if (!mindarSystem || started) return;

      try {
        // Разблокируем видео после клика
        for (const { video } of items) {
          video.muted = false; // если нужен звук
          video.playsInline = true;

          try {
            await video.play();
            video.pause();
            video.currentTime = 0;
          } catch (e) {
            console.warn("Не удалось разблокировать видео:", e);
          }
        }

        await mindarSystem.start();
        started = true;
      } catch (e) {
        console.error(e);
      }
    });

    items.forEach(({ target, video }) => {
      target.addEventListener("targetFound", async () => {
        try {
          stopAllVideos();

          video.currentTime = 0;
          await video.play();
        } catch (e) {
          console.error("Ошибка запуска видео:", e);
        }
      });

      target.addEventListener("targetLost", () => {
        video.pause();
        video.currentTime = 0;
      });
    });
  </script>
</body>
</html>
